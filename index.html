<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>论坛用户战力评估系统 (精确版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 900px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 30px; }
        .inputs { flex: 1; min-width: 300px; }
        .chart-box { flex: 1.2; min-width: 350px; text-align: center; }
        .stat-row { display: flex; align-items: center; margin-bottom: 15px; }
        .stat-row label { width: 90px; font-weight: bold; font-size: 14px; }
        /* 让滑块支持微调 */
        .stat-row input[type="range"] { flex: 1; margin: 0 10px; }
        .val-display { width: 45px; font-weight: bold; color: var(--accent); text-align: right; }
        .score-num { font-size: 3rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        h1 { text-align: center; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>📊 论坛战力精密评估</h1>
    
    <div class="inputs">
        <div class="stat-row">
            <label>用户昵称</label>
            <input type="text" id="username" value="匿名大佬" style="flex:1; padding:5px;">
        </div>
        <hr>
        <div class="stat-row">
            <label>攻击性</label>
            <input type="range" id="v1" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d1">3.00</span>
        </div>
        <div class="stat-row">
            <label>辩论能力</label>
            <input type="range" id="v2" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d2">3.00</span>
        </div>
        <div class="stat-row">
            <label>发帖质量</label>
            <input type="range" id="v3" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d3">3.00</span>
        </div>
        <div class="stat-row">
            <label>活跃度</label>
            <input type="range" id="v4" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d4">3.00</span>
        </div>
        <div class="stat-row">
            <label>专业度</label>
            <input type="range" id="v5" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d5">3.00</span>
        </div>
        <div class="stat-row">
            <label>淫乱度</label>
            <input type="range" id="v6" min="1" max="5" step="0.01" value="3.00" oninput="updateUI()">
            <span class="val-display" id="d6">3.00</span>
        </div>
        <button onclick="renderChart()">更新精密数据</button>
    </div>

    <div class="chart-box">
        <div id="scoreResult" class="score-num">60.00分</div>
        <canvas id="radarCanvas"></canvas>
    </div>
</div>

<script>
    let radarChart;

    function updateUI() {
        for(let i=1; i<=6; i++) {
            // 将输入值强制格式化为两位小数显示
            let val = parseFloat(document.getElementById('v'+i).value).toFixed(2);
            document.getElementById('d'+i).innerText = val;
        }
    }

    function renderChart() {
        const vals = [];
        for(let i=1; i<=6; i++) {
            vals.push(parseFloat(document.getElementById('v'+i).value));
        }

        // 综合评分计算 (百分制，保留两位小数)
        const totalScore = ((vals.reduce((a, b) => a + b, 0) / 30) * 100).toFixed(2);
        document.getElementById('scoreResult').innerText = totalScore + "分";

        const ctx = document.getElementById('radarCanvas').getContext('2d');
        if (radarChart) radarChart.destroy();

        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['攻击性', '辩论能力', '发帖质量', '活跃度', '专业度', '淫乱度'],
                datasets: [{
                    label: document.getElementById('username').value,
                    data: vals,
                    backgroundColor: 'rgba(46, 204, 113, 0.2)',
                    borderColor: '#2ecc71',
                    pointBackgroundColor: '#2ecc71',
                    borderWidth: 2
                }]
            },
            options: {
                scales: {
                    r: {
                        min: 0,
                        max: 5,
                        ticks: { stepSize: 1, display: false },
                        pointLabels: { font: { size: 14 } }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => { updateUI(); renderChart(); };
</script>
</body>
</html>
